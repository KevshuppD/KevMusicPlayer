name: Compile and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Update Version Name in build.gradle.kts
        run: |
          REF_NAME="${{ github.ref_name }}"
          if [[ "$REF_NAME" =~ ^v[0-9] ]]; then
            CLEAN_VERSION=${REF_NAME#v}
            echo "Updating versionName to $CLEAN_VERSION in app/build.gradle.kts"
            sed -i "s/versionName = \".*\"/versionName = \"$CLEAN_VERSION\"/g" app/build.gradle.kts
          else
            echo "Ref $REF_NAME is not a version tag, keeping default versionName"
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/KevMusicPlayer-${{ github.ref_name }}-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/KevMusicPlayer-${{ github.ref_name }}-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
